<div class="results-backdrop">
    <div class="results-modal">
        <h1 class="results-title">BATTLE CLEARED</h1>
        
        <div class="stats-container">
            <div class="stat-row">
                <span class="stat-label">Base Score</span>
                <span class="stat-value" id="base-score">100</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-row">
                <span class="stat-label">HP Bonus</span>
                <span class="stat-value positive" id="hp-bonus">+0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Combo Bonus</span>
                <span class="stat-value positive" id="combo-bonus">+0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Counters</span>
                <span class="stat-value positive" id="counters-bonus">+0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Penalties</span>
                <span class="stat-value negative" id="penalties">-0</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-row final-row">
                <span class="stat-label">Total Score</span>
                <span class="stat-value final" id="total-score">100</span>
            </div>
        </div>
        
        <div class="rank-stamp-container">
            <div class="rank-stamp" id="rank-stamp">B</div>
        </div>
        
        <button class="continue-btn">CONTINUE</button>
    </div>
</div>
