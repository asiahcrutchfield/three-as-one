<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>As One</title>

  <link rel="stylesheet" href="style.css">

  <script type="module" src="src/main.js"></script>

  <!-- !!!!!!!! DO NOT DELETE THIS!!!!!!!!! for vibe jam 2026 entry !!!!!!!!-->
  <script async src="https://vibej.am/2026/widget.js"></script>
  <!-- !!!!!!!! DO NOT DELETE THIS!!!!!!!!! for vibe jam 2026 entry !!!!!!!!-->
</head>

<body>
  <a href="/src/testing/index.html">Testing Ground</a>
  <div id="app">
    <!-- UI Container -->
    <div id="battle-ui">

      <div id="battle-stage">
        <div id="stage-background">
          <div class="stage-layer sky-layer"></div>
          <div class="stage-layer far-layer"></div>
          <div class="stage-layer mid-layer"></div>
          <div class="stage-layer ground-layer"></div>
        </div>

        <div id="hud-layer">
          <div id="player-hud" class="hud-panel">
            Player HUD
            <div class="stat-label"></div>
            <div class="stat-container hp-bar">
              <div class="stat-frame">
                <div class="portrait-slot">
                  <img src="/public/assets/characters/girl/emotions/girl_happy.png" alt="">
                </div>
                <div class="stats">
                  <div class="special-stat hidden"></div> <!-- ex: girl emotions -->
                  <div class="stat-track"><span class="stat-value" data-value="100">100</span> / <span class="stat-max"
                      data-max="100">100</span></div>
                </div>
              </div>
            </div>

          </div>
          <div id="enemy-hud" class="hud-panel">Enemy HUD</div>
        </div>

        <div id="action-layer">

          <!-- Main actions -->
          <ul id="action-main" class="menu-row">
            <li data-action="attack">Attack</li>
            <li data-action="defend">Defend</li>
            <li data-action="assist">Assist</li>
            <li data-action="switch">Switch</li>
          </ul>

          <!-- Submenu (changes dynamically) -->
          <ul id="action-sub" class="menu-row"></ul>

        </div>

        <div id="battle-lane">
          <div id="player-slot">
          </div>

          <div id="player-attack-slot"></div>
          <div id="enemy-attack-slot"></div>

          <div id="enemy-slot">
          </div>
        </div>

        <div id="stage-foreground">
          <div class="stage-layer foreground-layer"></div>
        </div>
      </div>

    </div>

  </div>
</body>

</html>
