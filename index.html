<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three As One - Combat Prototype</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #222;
        color: white;
        font-family: sans-serif;
      }
      #game-container {
        position: relative;
        width: 800px;
        height: 600px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }
      #battle-stage {
        position: absolute;
        top: 350px;
        left: 0;
        border: 1px solid black;
        width: 100%;
        height: 5px;
        box-sizing: border-box;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
