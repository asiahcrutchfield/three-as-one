<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Component Viewer</title>
    
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Inter', sans-serif;
            padding: 40px;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #1a1a1a 100%);
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            color: #f1c40f;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
        }

        .showcase {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .component-section {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
        }

        .component-section h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            color: #bdc3c7;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .component-container {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .controls button {
            background: #34495e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .controls button:hover {
            background: #2c3e50;
        }

        #action-log {
            text-align: center;
            height: 24px;
            color: #2ecc71;
            font-family: monospace;
            font-size: 16px;
        }
    </style>

    <script type="module" src="/assets/ui/health_bar/health_bar.js"></script>
    <script type="module" src="/assets/ui/combo_meter/combo_meter.js"></script>
    <script type="module" src="/assets/ui/action_buttons/action_buttons.js"></script>
    <script type="module" src="/assets/ui/battle_timer/battle_timer.js"></script>
    <script type="module" src="/assets/ui/cooldown/cooldown.js"></script>
    <script type="module" src="/assets/ui/portrait_frame/portrait_frame.js"></script>
    <script type="module" src="/assets/ui/results/results.js"></script>
    <script type="module" src="/assets/ui/reward_selection/reward_selection.js"></script>
    <script type="module" src="/assets/ui/switch/switch.js"></script>
</head>
<body>

    <h1>UI Component Viewer</h1>

    <div class="showcase">
        
        <!-- Timer & Cooldown -->
        <div class="component-section">
            <h2>Battle Timer & Cooldown</h2>
            <div class="component-container">
                <battle-timer id="demo-timer"></battle-timer>
                
                <div style="position: relative; width: 64px; height: 64px; background: #34495e; border-radius: 12px; display: flex; justify-content: center; align-items: center; border: 2px solid #2c3e50;">
                    <span style="font-weight: bold; font-size: 24px; color: #bdc3c7;">A</span>
                    <cooldown-indicator id="demo-cooldown" turns="0"></cooldown-indicator>
                </div>
            </div>
            <div class="controls">
                <button onclick="document.getElementById('demo-timer').start(7.0)">Start Timer (7s)</button>
                <button onclick="document.getElementById('demo-timer').stop()">Stop Timer</button>
                <button onclick="document.getElementById('demo-cooldown').setAttribute('turns', 3)">Set Cooldown (3)</button>
                <button onclick="document.getElementById('demo-cooldown').setAttribute('turns', 0)">Clear Cooldown</button>
            </div>
        </div>

        <!-- Portraits & Switch -->
        <div class="component-section">
            <h2>Portraits & Character Switch</h2>
            <div class="component-container">
                <portrait-frame name="Girl" role="support" active="true"></portrait-frame>
                <portrait-frame name="Man" role="damage" active="false"></portrait-frame>
            </div>
            <div class="component-container" style="margin-top: 30px;">
                <character-switch id="demo-switch" active="girl"></character-switch>
            </div>
        </div>

        <!-- Rewards -->
        <div class="component-section">
            <h2>Reward Selection</h2>
            <div class="component-container" style="transform: scale(0.8);">
                <reward-selection></reward-selection>
            </div>
        </div>
        
        <!-- Health Bars -->
        <div class="component-section">
            <h2>Health Bars</h2>
            <div class="component-container">
                <health-bar id="player-hp" hp="100" max-hp="100" name="Girl"></health-bar>
                <health-bar id="enemy-hp" hp="150" max-hp="150" name="Striker" type="enemy"></health-bar>
            </div>
            <div class="controls">
                <button onclick="changeHP('player-hp', -10)">Player -10 HP</button>
                <button onclick="changeHP('player-hp', 20)">Player +20 HP</button>
                <button onclick="changeHP('enemy-hp', -15)">Enemy -15 HP</button>
            </div>
        </div>

        <!-- Combo Meter -->
        <div class="component-section">
            <h2>Combo Meter</h2>
            <div class="component-container">
                <combo-meter id="combo" value="1.00"></combo-meter>
            </div>
            <div class="controls">
                <button onclick="changeCombo(0.25)">+0.25</button>
                <button onclick="changeCombo(0.50)">+0.50</button>
                <button onclick="resetCombo()">Reset (1.00)</button>
                <button onclick="maxCombo()">Max (3.00)</button>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="component-section">
            <h2>Action Buttons</h2>
            <div class="component-container">
                <action-buttons></action-buttons>
            </div>
            <div id="action-log">Ready...</div>
        </div>

    </div>

    <!-- Results Modal (Hidden by default) -->
    <battle-results id="demo-results" base="100" hp-bonus="25" combo-bonus="15" counters-bonus="10" penalties="0" total="150" rank="S" active="false"></battle-results>
    
    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 2000;">
        <button onclick="showResults('S')" style="padding: 10px; background: #f1c40f; border: none; cursor: pointer; font-weight: bold; margin-left: 5px;">Show Rank S</button>
        <button onclick="showResults('C')" style="padding: 10px; background: #e67e22; border: none; cursor: pointer; font-weight: bold; margin-left: 5px;">Show Rank C</button>
    </div>

    <script src="./ui-viewer.js" type="module"></script>
</body>
</html>
