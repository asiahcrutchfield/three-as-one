<div id="assists-layer" aria-label="Assist Portrait Preview">
    <div id="player-assist-preview" class="assist-preview-group">
        <div class="assist-preview-card">
            <div class="assist-preview-portrait">
                <img src="/assets/characters/officer/portrait/officer_portrait.png" alt="Officer assist portrait">
            </div>
            <div class="assist-preview-hp hp-bar">
                <div class="assist-preview-track stat-track">
                    <div class="assist-preview-fill stat-fill" style="width: 100%;"></div>
                </div>
            </div>
        </div>

        <div class="assist-preview-card">
            <div class="assist-preview-portrait">
                <img src="/assets/characters/man/portrait/man_portrait.png" alt="Man assist portrait">
            </div>
            <div class="assist-preview-hp hp-bar">
                <div class="assist-preview-track stat-track">
                    <div class="assist-preview-fill stat-fill" style="width: 72%;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="enemy-assist-preview" class="assist-preview-group hidden" aria-hidden="true">
        <div class="assist-preview-card">
            <div class="assist-preview-portrait">
                <img src="/assets/characters/officer/portrait/officer_portrait.png" alt="Enemy assist portrait">
            </div>
            <div class="assist-preview-hp hp-bar">
                <div class="assist-preview-track stat-track">
                    <div class="assist-preview-fill stat-fill" style="width: 84%;"></div>
                </div>
            </div>
        </div>

        <div class="assist-preview-card">
            <div class="assist-preview-portrait">
                <img src="/assets/characters/man/portrait/man_portrait.png" alt="Enemy assist portrait">
            </div>
            <div class="assist-preview-hp hp-bar">
                <div class="assist-preview-track stat-track">
                    <div class="assist-preview-fill stat-fill" style="width: 58%;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
