<div id="player-hud" class="hud-panel">
    <div class="stat-frame">
        <div class="info-frame">
            <div class="portrait-frames">
                <div class="portrait-slot">
                    <img src="/assets/characters/girl/emotions/girl_happy.png" alt="Girl portrait">
                    <span class="special-stat">Happy</span>
                </div>
                <div class="portrait-slot portrait-slot2">
                    <img src="/assets/characters/tiger/portrait/tiger_portrait.png" alt="Tiger portrait">
                </div>
            </div>
            <div class="name-frame">
                <span class="name">Girl + Tiger</span>
            </div>
        </div>
        <div class="hp-bar">
            <div class="stat-track">
                <div class="stat-fill" style="width: 84%;"></div>
                <span class="stat-value" data-value="84">84</span> / <span class="stat-max" data-max="100">100</span>
            </div>
        </div>
    </div>
</div>
