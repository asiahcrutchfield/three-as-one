<div id="action-menu">
    <div id="action-preview-tooltip" class="action-preview-tooltip">
        <div class="action-preview-tooltip-title-row">
            <div class="action-preview-tooltip-title">Heavy Swing</div>
            <div class="action-preview-tooltip-meta"></div>
        </div>
        <div class="action-preview-tooltip-body">Big damage, slower timed strike. Best when momentum is high.</div>
    </div>

    <ul id="action-main" class="menu-row">
        <li data-action="attack" class="action-main-item">
            <div class="action-main-icon">
                <img src="/assets/icons/actionMenu/action.png" alt="Attack">
            </div>
            <span class="action-main-label">Attack</span>
        </li>
        <li data-action="defend" class="action-main-item">
            <div class="action-main-icon">
                <img src="/assets/icons/actionMenu/defense.png" alt="Defend">
            </div>
            <span class="action-main-label">Defend</span>
        </li>
        <li data-action="assist" class="action-main-item">
            <div class="action-main-icon">
                <img src="/assets/icons/actionMenu/assist.png" alt="Assist">
            </div>
            <span class="action-main-label">Assist</span>
        </li>
        <li data-action="switch" class="action-main-item">
            <div class="action-main-icon">
                <img src="/assets/icons/actionMenu/switch.png" alt="Switch">
            </div>
            <span class="action-main-label">Switch</span>
        </li>
    </ul>
</div>
