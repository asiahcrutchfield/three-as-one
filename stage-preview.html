<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stage Preview</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="src/stagePreview.js"></script>
</head>

<body class="stage-preview-page">
  <div id="stage-preview-app">
    <aside class="stage-preview-sidebar">
      <div class="stage-preview-card">
        <div class="stage-preview-kicker">Stage Preview</div>
        <h1 class="stage-preview-title">Lane Tuner</h1>
        <p class="stage-preview-copy">Preview each stage with one player unit and one enemy, then tune the red floor line until their feet align correctly.</p>
      </div>

      <div class="stage-preview-card">
        <label class="stage-preview-field">
          <span>Stage</span>
          <select id="stage-select"></select>
        </label>

        <label class="stage-preview-field">
          <span>Player</span>
          <select id="player-select">
            <option value="girl_tiger">Girl + Tiger</option>
            <option value="girl">Girl</option>
            <option value="officer">Officer</option>
            <option value="man">Man</option>
          </select>
        </label>

        <label class="stage-preview-field">
          <span>Enemy</span>
          <select id="enemy-select">
            <option value="familiar">Familiar</option>
            <option value="order">Order</option>
            <option value="watcher">Watcher</option>
            <option value="convergence">Convergence</option>
          </select>
        </label>
      </div>

      <div class="stage-preview-card">
        <div class="stage-preview-field">
          <span>Floor Line (`floor.fromBottom`)</span>
          <input id="floor-slider" type="range" min="0" max="400" step="1">
        </div>

        <label class="stage-preview-field">
          <span>Exact Value</span>
          <input id="floor-input" type="number" min="0" max="400" step="1">
        </label>

        <div class="stage-preview-readout">
          <div><span>Stage Size</span><strong id="stage-dimensions">-</strong></div>
          <div><span>Lane Height</span><strong id="lane-height">-</strong></div>
          <div><span>Floor Line</span><strong id="floor-value">-</strong></div>
        </div>
      </div>

      <div class="stage-preview-card">
        <div class="stage-preview-field">
          <span>Selected Stage JSON</span>
          <pre id="stage-json-output" class="stage-preview-code"></pre>
        </div>
      </div>
    </aside>

    <main class="stage-preview-main">
      <div id="battle-ui" class="stage-preview-battle-ui">
        <div id="battle-stage">
          <div id="stage-background">
            <div class="stage-layer sky-layer"></div>
            <div class="stage-layer far-layer"></div>
            <div class="stage-layer mid-layer"></div>
            <div class="stage-layer ground-layer"></div>
          </div>

          <div id="battle-lane">
            <div id="player-slot"></div>
            <div id="attack-slot"></div>
            <div id="enemy-slot"></div>
          </div>

          <div id="stage-foreground">
            <div class="stage-layer foreground-layer"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>

</html>
